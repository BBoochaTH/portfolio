<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | หน้าหลัก</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    background:#FFF7FA;
    color:#555;
}

/* เมนู */
nav{
    background:#F8BBD0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 60px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:white;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:0.3s;
}

nav ul li a:hover{
    color:#C2185B;
}

/* หน้าหลัก */
.home{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    width:420px;
    padding:40px;
    text-align:center;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    animation:fade 1s;
}

.profile{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #F8BBD0;
    margin-bottom:20px;
}

h1{
    color:#E91E63;
    margin-bottom:10px;
}

h2{
    color:#666;
    font-weight:400;
    margin-bottom:10px;
}

p{
    font-size:18px;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    background:#F8BBD0;
    color:white;
    text-decoration:none;
    padding:12px 30px;
    border-radius:30px;
    transition:0.3s;
}

.btn:hover{
    background:#EC6C9E;
    transform:scale(1.05);
}

footer{
    background:#F8BBD0;
    color:white;
    text-align:center;
    padding:15px;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Responsive */
@media(max-width:768px){

nav{
    flex-direction:column;
    padding:20px;
}

nav ul{
    flex-direction:column;
    text-align:center;
    margin-top:10px;
}

nav ul li{
    margin:10px 0;
}

.card{
    width:90%;
}
}
</style>

</head>
<body>

<nav>
    <div class="logo">Portfolio</div>

    <ul>
        <li><a href="index.html">หน้าหลัก</a></li>
        <li><a href="profile.html">ประวัติส่วนตัว</a></li>
        <li><a href="education.html">ประวัติการศึกษา</a></li>
        <li><a href="portfolio.html">ผลงานและกิจกรรม</a></li>
        <li><a href="contact.html">ช่องทางการติดต่อ</a></li>
    </ul>
</nav>

<section class="home">

    <div class="card">

        <img src="images/profile.jpg" alt="รูปโปรไฟล์" class="profile">

        <h1>ธนพล บูชา</h1>

        <h2>นักเรียนชั้นมัธยมศึกษาปีที่ 6</h2>

        <p>นักเรียนโรงเรียนพานทอง</p>

        <a href="profile.html" class="btn">ดูประวัติส่วนตัว</a>

    </div>

</section>

<footer>
    © 2026 Portfolio | Thanaphon Bucha
</footer>

</body>
</html>
