<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | หน้าหลัก</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

/* พื้นหลังเคลื่อนไหว */
body{
    background:linear-gradient(
        -45deg,
        #F5F9FF,
        #D6E9FF,
        #A7D8FF,
        #EAF4FF
    );
    background-size:400% 400%;
    animation:gradientBG 10s ease infinite;
    color:#444;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ฟองลอย */
.bubbles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
}

.bubbles span{
    position:absolute;
    bottom:-150px;
    background:rgba(255,255,255,0.5);
    border:2px solid rgba(255,255,255,0.8);
    border-radius:50%;
    animation:float linear infinite;
}

.bubbles span:nth-child(1){
    left:5%;
    width:80px;
    height:80px;
    animation-duration:8s;
}

.bubbles span:nth-child(2){
    left:15%;
    width:120px;
    height:120px;
    animation-duration:10s;
}

.bubbles span:nth-child(3){
    left:25%;
    width:70px;
    height:70px;
    animation-duration:7s;
}

.bubbles span:nth-child(4){
    left:35%;
    width:140px;
    height:140px;
    animation-duration:11s;
}

.bubbles span:nth-child(5){
    left:45%;
    width:90px;
    height:90px;
    animation-duration:8s;
}

.bubbles span:nth-child(6){
    left:55%;
    width:110px;
    height:110px;
    animation-duration:10s;
}

.bubbles span:nth-child(7){
    left:65%;
    width:75px;
    height:75px;
    animation-duration:7s;
}

.bubbles span:nth-child(8){
    left:75%;
    width:130px;
    height:130px;
    animation-duration:12s;
}

.bubbles span:nth-child(9){
    left:85%;
    width:90px;
    height:90px;
    animation-duration:8s;
}

.bubbles span:nth-child(10){
    left:95%;
    width:110px;
    height:110px;
    animation-duration:10s;
}

@keyframes float{
    0%{
        transform:translateY(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* เมนู */
nav{
    background:#2E86DE;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 60px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    position:relative;
    z-index:2;
}

.logo{
    font-size:28px;
    font-weight:600;
    color:white;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:.3s;
}

nav ul li a:hover{
    color:#D6E9FF;
}

.active{
    color:#D6E9FF;
    font-weight:600;
}

/* หน้าแรก */
.home{
    min-height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:2;
}

.card{
    background:white;
    width:450px;
    padding:40px;
    text-align:center;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.profile{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #A7D8FF;
    margin-bottom:20px;
}

h1{
    color:#1E3A5F;
    margin-bottom:10px;
}

h2{
    color:#555;
    font-size:20px;
    font-weight:500;
}

h3{
    color:#666;
    font-weight:400;
    margin-bottom:10px;
}

h4{
    color:#777;
    margin-top:8px;
    font-weight:400;
}

.school{
    font-size:22px;
    color:#2E86DE;
    font-weight:600;
    margin-top:15px;
    margin-bottom:25px;
}

.btn{
    display:inline-block;
    background:#2E86DE;
    color:white;
    text-decoration:none;
    padding:12px 30px;
    border-radius:30px;
    transition:.3s;
}

.btn:hover{
    background:#1E3A5F;
    transform:scale(1.05);
}

footer{
    background:#2E86DE;
    color:white;
    text-align:center;
    padding:15px;
    position:relative;
    z-index:2;
}

/* Responsive */
@media(max-width:768px){

nav{
    flex-direction:column;
    padding:20px;
}

nav ul{
    flex-direction:column;
    text-align:center;
    margin-top:10px;
}

nav ul li{
    margin:10px 0;
}

.card{
    width:90%;
}

.profile{
    width:150px;
    height:150px;
}
}
</style>
</head>

    <span></span>
</div>

    <div class="card">

        <h3>Welcome to my portfolio</h3>

        <h1>ธนพล บูชา</h1>

        <h2>นักเรียนชั้นมัธยมศึกษาปีที่ 6</h2>

        <h4>แผนการเรียนวิทยาศาสตร์–คณิตศาสตร์</h4>

        <p class="school">โรงเรียนพานทอง</p>

        <a href="personal.html" class="btn">เข้าสู่ portfolio</a>

    </div>

<footer>
