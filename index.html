<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio | หน้าหลัก</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

/* พื้นหลัง */
body{
    background: linear-gradient(
        -45deg,
        #FFF7FA,
        #FFE4EC,
        #F8BBD0,
        #FFD6E7
    );
    background-size:400% 400%;
    animation:gradientBG 8s ease infinite;
    color:#555;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ฟองลอย */
.bubbles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.bubbles span{
    position:absolute;
    display:block;
    width:100px;
    height:100px;
    background:rgba(255,255,255,0.45);
    border:2px solid rgba(255,255,255,0.7);
    border-radius:50%;
    animation:float 8s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-200px);
        opacity:0;
    }
}

.bubbles span:nth-child(1){left:5%; animation-duration:5s;}
.bubbles span:nth-child(2){left:15%; width:120px;height:120px; animation-duration:7s;}
.bubbles span:nth-child(3){left:25%; animation-duration:6s;}
.bubbles span:nth-child(4){left:35%; width:140px;height:140px; animation-duration:8s;}
.bubbles span:nth-child(5){left:45%; animation-duration:5s;}
.bubbles span:nth-child(6){left:55%; width:110px;height:110px; animation-duration:7s;}
.bubbles span:nth-child(7){left:65%; animation-duration:6s;}
.bubbles span:nth-child(8){left:75%; width:130px;height:130px; animation-duration:8s;}
.bubbles span:nth-child(9){left:85%; animation-duration:5s;}
.bubbles span:nth-child(10){left:95%; width:120px;height:120px; animation-duration:7s;}

/* เมนู */
nav{
    background:#F8BBD0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 60px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    position:relative;
    z-index:2;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:white;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:18px;
    transition:.3s;
}

nav ul li a:hover{
    color:#C2185B;
}

.active{
    color:#C2185B;
    font-weight:bold;
}

/* หน้าหลัก */
.home{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    z-index:2;
}

.card{
    background:white;
    width:450px;
    padding:40px;
    text-align:center;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.profile{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #F8BBD0;
    margin-bottom:20px;
}

h1{
    color:#ff6b9d;
    margin-bottom:10px;
}

h2{
    color:#666;
    font-weight:500;
    font-size:20px;
}

h3{
    color:#999;
    margin-bottom:10px;
    font-weight:400;
}

h4{
    margin-top:10px;
    color:#777;
    font-weight:400;
}

.school{
    font-size:22px;
    margin-top:15px;
    margin-bottom:25px;
    color:#ff6b9d;
    font-weight:600;
}

.btn{
    display:inline-block;
    background:#F8BBD0;
    color:white;
    text-decoration:none;
    padding:12px 30px;
    border-radius:30px;
    transition:.3s;
}

.btn:hover{
    background:#EC6C9E;
    transform:scale(1.05);
}

footer{
    background:#F8BBD0;
    color:white;
    text-align:center;
    padding:15px;
    position:relative;
    z-index:2;
}

/* Responsive */
@media(max-width:768px){

nav{
    flex-direction:column;
    padding:20px;
}

nav ul{
    flex-direction:column;
    text-align:center;
    margin-top:10px;
}

nav ul li{
    margin:10px 0;
}

.card{
    width:90%;
}
}
</body>
   </style>
